<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NERGY Document Intelligence</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Document Intelligence</h1>
      <p class="subtitle">Upload PDFs, ask questions, get cited answers</p>
    </header>

    <section class="card">
      <h2>1. Upload a document</h2>
      <div class="upload-row">
        <input type="file" id="fileInput" accept=".pdf">
        <button id="uploadBtn">Upload</button>
      </div>
      <div id="uploadStatus" class="status"></div>
      <ul id="docList" class="doc-list"></ul>
    </section>

    <section class="card">
      <h2>2. Ask a question</h2>
      <div class="ask-row">
        <input type="text" id="questionInput" placeholder="Ask something about your uploaded documents...">
        <button id="askBtn">Ask</button>
      </div>
      <div id="answerBox" class="answer-box hidden">
        <div id="answerText" class="answer-text"></div>
        <div id="sourcesBox" class="sources-box"></div>
      </div>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
